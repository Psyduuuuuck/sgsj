<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>上古世纪攻略知识库</title>
<style>
:root{--bg:#07111f;--panel:#0f172a;--line:#263244;--text:#e5e7eb;--muted:#94a3b8;--accent:#facc15;--accent2:#38bdf8}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#07111f,#111827);color:var(--text);font:16px/1.75 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}aside{position:sticky;top:0;height:100vh;overflow:auto;background:rgba(15,23,42,.92);border-right:1px solid var(--line);padding:18px}h1{font-size:21px;margin:0 0 8px}p{margin:0 0 12px}.muted{color:var(--muted);font-size:13px}.search{width:100%;border:1px solid #334155;background:#020617;color:#fff;border-radius:12px;padding:12px;margin:14px 0;font-size:15px;outline:none}.search:focus{border-color:var(--accent2)}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.chips button,.btn{border:1px solid #334155;background:#111827;color:#dbeafe;border-radius:999px;padding:6px 10px;cursor:pointer}.chips button:hover,.btn:hover{border-color:var(--accent2)}.toc button{display:block;width:100%;text-align:left;background:transparent;border:0;color:#cbd5e1;border-radius:8px;padding:5px 8px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toc button:hover,.toc button.active{background:#1e293b;color:#fff}.lvl1{font-weight:700;margin-top:8px}.lvl2{padding-left:16px!important}.lvl3{padding-left:30px!important;font-size:14px}.lvl4,.lvl5{padding-left:44px!important;font-size:13px;color:#94a3b8!important}main{min-width:0}.top{position:sticky;top:0;z-index:2;background:rgba(7,17,31,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 22px;display:flex;justify-content:space-between;gap:10px;align-items:center}.wrap{max-width:1120px;margin:0 auto;padding:24px}.hero,.panel{background:rgba(15,23,42,.86);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.22);padding:24px;margin-bottom:16px}.hero h2{font-size:32px;margin:0 0 10px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:14px}.metric{background:#020617;border:1px solid #1f2937;border-radius:14px;padding:12px}.metric b{font-size:24px;display:block}.metric span{color:var(--muted);font-size:13px}.article h2{font-size:28px;margin:0 0 6px}.content{white-space:pre-wrap;font-size:16px}.result{border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#0b1220;cursor:pointer}.result:hover{border-color:var(--accent2)}mark{background:rgba(250,204,21,.28);color:#fff;padding:0 2px;border-radius:3px}.actions{display:flex;gap:8px;flex-wrap:wrap}.raw{display:none;background:#020617;border:1px solid #334155;border-radius:14px;padding:14px;white-space:pre-wrap;overflow:auto}.mobile{display:none}@media(max-width:900px){.app{display:block}aside{position:fixed;left:-340px;width:320px;z-index:4;transition:.2s}.show aside{left:0}.mobile{display:inline-block}.wrap{padding:14px}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app" id="app"><aside><h1>上古世纪攻略知识库</h1><p class="muted">完整 Markdown 压缩加载，本地前端搜索，无后端。</p><input id="q" class="search" placeholder="搜索：跑商 / 钓鱼 / 宗师 / 世界BOSS" /><div class="chips" id="chips"></div><nav class="toc" id="toc"></nav></aside><main><div class="top"><div><button class="btn mobile" id="menu">目录</button> <span id="status" class="muted">加载中...</span></div><div class="actions"><button class="btn" id="copy">复制本节</button><button class="btn" id="rawBtn">显示原文</button></div></div><div class="wrap"><section class="hero"><h2>上古世纪 NA 日活图文攻略</h2><p>适合玩家查询，也适合 AI 知识库/RAG 使用。你可以搜索关键词、按章节阅读、复制章节给 AI。</p><div class="grid"><div class="metric"><b id="secN">0</b><span>章节</span></div><div class="metric"><b>336</b><span>PDF 页数</span></div><div class="metric"><b>9.5</b><span>攻略版本</span></div><div class="metric"><b>MD</b><span>知识库格式</span></div></div></section><section class="panel" id="results" style="display:none"></section><article class="panel article"><h2 id="title">加载中</h2><p class="muted" id="meta"></p><div class="content" id="content"></div><pre class="raw" id="raw"></pre></article></div></main></div>
<script>
let sections=[], current=null;
const $=id=>document.getElementById(id); const esc=s=>String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); const norm=s=>String(s||'').toLowerCase().replace(/\s+/g,'');
async function loadMd(){
 const b64=await fetch('ArcheAge_NA_daily_guide_KB.md.gz.b64').then(r=>r.text());
 const bin=Uint8Array.from(atob(b64.trim()),c=>c.charCodeAt(0));
 let text;
 if('DecompressionStream' in window){
  const ds=new DecompressionStream('gzip'); const stream=new Blob([bin]).stream().pipeThrough(ds); text=await new Response(stream).text();
 }else{ alert('当前浏览器不支持在线解压，请使用最新版 Chrome / Edge / Safari。'); text=''; }
 parseMd(text); render();
}
function parseMd(md){
 const lines=md.split(/\r?\n/); let cur={id:'intro',level:1,title:'前言 / 总览',content:'',line:1}; sections=[cur];
 lines.forEach((line,i)=>{ const m=line.match(/^(#{1,5})\s+(.+)$/); if(m){ cur={id:'s'+String(sections.length+1).padStart(3,'0'),level:m[1].length,title:m[2].trim(),content:'',line:i+1}; sections.push(cur); } else { cur.content+=line+'\n'; }});
 sections=sections.map(s=>({...s,summary:s.content.replace(/\s+/g,' ').slice(0,180),search:(s.title+' '+s.content).toLowerCase()}));
}
function render(){ $('secN').textContent=sections.length; $('status').textContent=sections.length+' 个章节 · 全文已加载'; $('toc').innerHTML=sections.map(s=>`<button class="lvl${Math.min(s.level,5)}" data-id="${s.id}" title="${esc(s.title)}">${esc(s.title)}</button>`).join(''); $('toc').onclick=e=>{if(e.target.dataset.id) open(e.target.dataset.id)}; ['跑商','钓鱼','采矿','世界BOSS','宗师','daily','weekly','蓝颜商会','不推荐'].forEach(w=>{let b=document.createElement('button');b.textContent=w;b.onclick=()=>{$('q').value=w;search()};$('chips').appendChild(b)}); open((location.hash||'#s001').slice(1));}
function open(id,query=''){ current=sections.find(s=>s.id===id)||sections[0]; location.hash=current.id; document.querySelectorAll('.toc button').forEach(b=>b.classList.toggle('active',b.dataset.id===current.id)); $('title').textContent=current.title; $('meta').textContent='Markdown 行号约：'+current.line; $('content').innerHTML=highlight(esc(current.content.trim()||'本节暂无正文。'),query); $('raw').textContent=JSON.stringify(current,null,2); document.body.classList.remove('show');}
function highlight(html,q){ if(!q) return html; for(const t of q.trim().split(/\s+/).filter(Boolean).slice(0,6)){ html=html.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`)} return html;}
function search(){ const q=$('q').value.trim(); if(!q){$('results').style.display='none';return} const nq=norm(q); const found=sections.map(s=>{let score=0;if(norm(s.title).includes(nq))score+=100;if(norm(s.content).includes(nq))score+=60;for(const p of q.split(/\s+/)){if(norm(s.search).includes(norm(p)))score+=20}return{s,score}}).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,40); $('results').style.display='block'; $('results').innerHTML='<h2>搜索结果：'+esc(q)+' <span class="muted">'+found.length+' 条</span></h2>'+(found.map(({s})=>`<div class="result" data-id="${s.id}"><b>${esc(s.title)}</b><p class="muted">${highlight(esc(s.summary),q)}</p></div>`).join('')||'<p class="muted">没有找到结果，请换一个关键词。</p>'); $('results').querySelectorAll('.result').forEach(r=>r.onclick=()=>open(r.dataset.id,q)); if(found[0])open(found[0].s.id,q);}
$('q').addEventListener('input',()=>{clearTimeout(window.t);window.t=setTimeout(search,120)}); $('menu').onclick=()=>document.body.classList.toggle('show'); $('copy').onclick=()=>current&&navigator.clipboard.writeText('# '+current.title+'\n\n'+current.content); $('rawBtn').onclick=()=>{$('raw').style.display=$('raw').style.display==='block'?'none':'block'}; window.addEventListener('hashchange',()=>open((location.hash||'#s001').slice(1))); loadMd();
</script>
</body></html>
