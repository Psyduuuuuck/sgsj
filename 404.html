<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>上古世纪 NA 日活攻略知识库</title>
  <meta name="description" content="上古世纪 NA 日活图文攻略在线知识库，支持全文搜索、章节浏览、图片查看和 AI/RAG 数据导出。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23111827'/%3E%3Ctext x='50' y='62' font-size='50' text-anchor='middle' fill='%23facc15'%3E古%3C/text%3E%3C/svg%3E" />
  <style>
    :root{
      --bg:#0b1020; --panel:#111827; --panel2:#172033; --text:#e5e7eb; --muted:#a5b4c4;
      --line:#273244; --accent:#facc15; --accent2:#38bdf8; --danger:#fb7185; --card:#0f172a;
      --shadow: 0 18px 50px rgba(0,0,0,.25); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(135deg,#08111f,#101827 55%,#16101f);color:var(--text);font:16px/1.72 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;}
    a{color:var(--accent2);text-decoration:none} a:hover{text-decoration:underline}
    .app{display:grid;grid-template-columns:330px 1fr;min-height:100vh}
    aside{border-right:1px solid var(--line);background:rgba(15,23,42,.88);backdrop-filter:blur(16px);position:sticky;top:0;height:100vh;overflow:hidden;display:flex;flex-direction:column}
    .brand{padding:22px 20px 14px;border-bottom:1px solid var(--line)}
    .brand h1{font-size:19px;margin:0 0 6px;letter-spacing:.4px}.brand p{margin:0;color:var(--muted);font-size:13px}
    .searchBox{padding:16px 16px 12px;border-bottom:1px solid var(--line)}
    .searchBox input{width:100%;border:1px solid #344056;background:#0b1220;color:var(--text);border-radius:14px;padding:13px 14px;font-size:15px;outline:none}.searchBox input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
    .quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.quick button,.chip{border:1px solid #35435a;background:#111b2d;color:#cbd5e1;border-radius:999px;padding:5px 10px;font-size:12px;cursor:pointer}.quick button:hover,.chip:hover{border-color:var(--accent2);color:white}
    .toc{overflow:auto;padding:12px 10px 24px;flex:1}.toc button{display:block;width:100%;text-align:left;color:#dbeafe;background:transparent;border:0;border-radius:10px;padding:7px 10px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toc button:hover{background:#162238}.toc button.active{background:#23314d;color:white;border-left:3px solid var(--accent)}
    .toc .lvl1{font-weight:750;margin-top:6px}.toc .lvl2{padding-left:20px;color:#c6d3e4}.toc .lvl3{padding-left:34px;color:#b7c5d6}.toc .lvl4,.toc .lvl5{padding-left:48px;color:#aab8ca;font-size:13px}
    main{min-width:0}.topbar{position:sticky;top:0;z-index:4;padding:13px 22px;border-bottom:1px solid var(--line);background:rgba(11,16,32,.82);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;gap:10px}.topbar .stats{color:var(--muted);font-size:13px}.topbar .actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #3b4860;background:#121c2e;color:#e5e7eb;border-radius:12px;padding:8px 12px;cursor:pointer}.btn:hover{border-color:var(--accent2);background:#17243a;text-decoration:none}.btn.primary{background:#facc15;color:#111827;border-color:#facc15;font-weight:700}
    .wrap{max-width:1180px;margin:0 auto;padding:24px}.hero{background:radial-gradient(circle at top left,rgba(250,204,21,.18),transparent 32%),radial-gradient(circle at top right,rgba(56,189,248,.14),transparent 30%),rgba(15,23,42,.72);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;margin-bottom:18px}.hero h2{font-size:34px;line-height:1.25;margin:0 0 10px}.hero p{color:#cbd5e1;margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metric{background:#0b1220;border:1px solid #273244;border-radius:16px;padding:14px}.metric strong{font-size:24px;display:block}.metric span{color:var(--muted);font-size:13px}
    .panel{background:rgba(15,23,42,.82);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}.sectionTitle{display:flex;justify-content:space-between;align-items:start;gap:12px;margin-bottom:12px}.sectionTitle h2{font-size:30px;line-height:1.25;margin:0}.meta{color:var(--muted);font-size:13px;white-space:nowrap}.tags{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 18px}.tag{font-size:12px;color:#fef3c7;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.25);padding:4px 9px;border-radius:999px}.content{font-size:17px;color:#e6edf5}.content p{margin:0 0 12px}.content .empty{color:var(--muted)} mark{background:rgba(250,204,21,.28);color:#fff;border-radius:4px;padding:0 2px}.results{display:none;margin-bottom:18px}.resultItem{border:1px solid var(--line);border-radius:16px;background:#0d1627;padding:14px;margin-bottom:10px;cursor:pointer}.resultItem:hover{border-color:var(--accent2)}.resultItem h3{font-size:17px;margin:0 0 6px}.resultItem p{margin:0;color:#cbd5e1;font-size:14px}.resultMeta{color:var(--muted);font-size:12px;margin-top:6px}.imageGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:20px}.imageCard{border:1px solid var(--line);background:#0b1220;border-radius:14px;padding:8px}.imageCard img{width:100%;height:150px;object-fit:contain;border-radius:10px;background:#050913;cursor:zoom-in}.imageCard div{font-size:12px;color:var(--muted);margin-top:6px;word-break:break-all}.copyBox{display:none;margin-top:14px;background:#0b1220;border:1px solid #344056;border-radius:14px;padding:12px;color:#cbd5e1;font-size:13px;white-space:pre-wrap}.footer{color:var(--muted);font-size:13px;margin:22px 0;text-align:center}.mobileMenu{display:none}.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:20;display:none;align-items:center;justify-content:center;padding:20px}.modal img{max-width:96vw;max-height:92vh;border-radius:12px;background:#050913}.modal button{position:absolute;top:16px;right:16px}
    @media (max-width: 900px){.app{grid-template-columns:1fr}aside{position:fixed;left:-340px;z-index:10;width:320px;transition:.22s}.showNav aside{left:0}.mobileMenu{display:inline-block}.topbar{padding:12px}.wrap{padding:14px}.grid{grid-template-columns:repeat(2,1fr)}.hero h2{font-size:26px}.sectionTitle{display:block}.meta{white-space:normal;margin-top:6px}}
    @media (max-width: 520px){.grid{grid-template-columns:1fr}.hero{padding:20px}.panel{padding:18px}.sectionTitle h2{font-size:24px}.content{font-size:16px}}
  </style>
</head>
<body>
<div class="app" id="app">
  <aside>
    <div class="brand">
      <h1>上古世纪 NA 攻略知识库</h1>
      <p>PDF → Markdown → 在线搜索 → AI/RAG 分块</p>
    </div>
    <div class="searchBox">
      <input id="search" placeholder="搜索：跑商 / 钓鱼 / 宗师 / 世界BOSS..." autocomplete="off" />
      <div class="quick" id="quick"></div>
    </div>
    <nav class="toc" id="toc"></nav>
  </aside>
  <main>
    <div class="topbar">
      <div><button class="btn mobileMenu" id="menuBtn">目录</button> <span class="stats" id="stats"></span></div>
      <div class="actions">
        <a class="btn" href="ArcheAge_NA_daily_guide_KB.md" target="_blank">Markdown</a>
        <a class="btn" href="rag/chunks.jsonl" target="_blank">JSONL</a>
        <a class="btn" href="llms.txt" target="_blank">llms.txt</a>
      </div>
    </div>
    <div class="wrap">
      <section class="hero" id="hero">
        <h2>上古世纪 NA 日活图文攻略</h2>
        <p>适合玩家快速查询，也适合作为 AI 知识库数据源。支持全文搜索、章节目录、图片查看、复制章节给 AI。</p>
        <div class="grid">
          <div class="metric"><strong id="mSections">0</strong><span>章节分块</span></div>
          <div class="metric"><strong id="mImages">0</strong><span>图片资源</span></div>
          <div class="metric"><strong>336</strong><span>PDF 原页数</span></div>
          <div class="metric"><strong>9.5</strong><span>攻略更新版本</span></div>
        </div>
      </section>
      <section class="results panel" id="results"></section>
      <article class="panel" id="article"></article>
      <div class="footer">静态站点，无后端、无数据库。内容来源于用户上传 PDF 整理版。</div>
    </div>
  </main>
</div>
<div class="modal" id="modal"><button class="btn primary" id="closeModal">关闭</button><img id="modalImg" alt="预览图" /></div>
<script src="kb-data.js"></script>
<script>
(function(){
  const sections = window.KB_SECTIONS || [];
  const $ = (id)=>document.getElementById(id);
  const toc=$('toc'), article=$('article'), search=$('search'), results=$('results'), stats=$('stats');
  const quickWords=['跑商','钓鱼','采矿','世界BOSS','daily','weekly','宗师装备','不推荐','锁船','蓝颜商会'];
  $('quick').innerHTML = quickWords.map(w=>`<button data-q="${w}">${w}</button>`).join('');
  $('quick').addEventListener('click', e=>{ if(e.target.dataset.q){ search.value=e.target.dataset.q; doSearch(); }});
  $('menuBtn').addEventListener('click', ()=>document.body.classList.toggle('showNav'));

  const imageCount = sections.reduce((n,s)=>n+(s.images? s.images.length:0),0);
  $('mSections').textContent = sections.length;
  $('mImages').textContent = imageCount;
  stats.textContent = `${sections.length} 个章节 · ${imageCount} 张图片`;

  function esc(s){ return String(s||'').replace(/[&<>'"]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[c])); }
  function norm(s){ return String(s||'').toLowerCase().replace(/\s+/g,''); }
  function paraHtml(text, q){
    const terms = q ? q.trim().split(/\s+/).filter(Boolean).slice(0,6) : [];
    return String(text||'').split(/\n\s*\n/).map(p=>{
      let safe=esc(p).replace(/\n/g,'<br>');
      for(const t of terms){
        const re = new RegExp(escReg(t), 'gi');
        safe = safe.replace(re, m=>`<mark>${m}</mark>`);
      }
      return `<p>${safe}</p>`;
    }).join('') || '<p class="empty">本节暂无正文。</p>';
  }
  function escReg(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
  function meta(s){ return `PDF 页码：${s.page_start}${s.page_end && s.page_end!==s.page_start ? '–'+s.page_end : ''}`; }
  function renderToc(){
    toc.innerHTML = sections.map(s=>`<button title="${esc(s.title)}" class="lvl${Math.min(s.level,5)}" data-id="${s.id}">${esc(s.title)}</button>`).join('');
    toc.addEventListener('click', e=>{ const id=e.target.dataset.id; if(id) openSection(id); });
  }
  function openSection(id, q=''){
    const s = sections.find(x=>x.id===id) || sections[0]; if(!s) return;
    location.hash = s.id;
    document.querySelectorAll('.toc button').forEach(b=>b.classList.toggle('active', b.dataset.id===s.id));
    const tags=(s.keywords||[]).map(k=>`<span class="tag">${esc(k)}</span>`).join('');
    const imgs=(s.images||[]).map((src,i)=>`<div class="imageCard"><img loading="lazy" src="${esc(src)}" alt="${esc(s.title)} 图 ${i+1}" data-full="${esc(src)}"><div>${esc(src)}</div></div>`).join('');
    article.innerHTML = `
      <div class="sectionTitle"><h2>${esc(s.title)}</h2><div class="meta">${meta(s)}</div></div>
      <div class="tags">${tags}</div>
      <div class="actions" style="margin-bottom:16px">
        <button class="btn" id="copySection">复制本章</button>
        <button class="btn" id="copyAIPrompt">复制 AI 问答上下文</button>
        <button class="btn" id="toggleRaw">显示/隐藏原文</button>
      </div>
      <div class="content">${paraHtml(s.content, q)}</div>
      ${imgs ? `<h3 style="margin-top:26px">本节图片资源</h3><div class="imageGrid">${imgs}</div>` : ''}
      <pre class="copyBox" id="rawBox">${esc(JSON.stringify(s,null,2))}</pre>`;
    $('copySection').onclick=()=>copyText(`# ${s.title}\n\n${s.content}`);
    $('copyAIPrompt').onclick=()=>copyText(`请仅根据以下《上古世纪 NA 攻略知识库》章节内容回答问题。\n\n章节：${s.title}\nPDF页码：${s.page_start}-${s.page_end}\n关键词：${(s.keywords||[]).join('、')}\n\n正文：\n${s.content}`);
    $('toggleRaw').onclick=()=>{ const r=$('rawBox'); r.style.display=r.style.display==='block'?'none':'block'; };
    article.querySelectorAll('.imageCard img').forEach(img=>img.onclick=()=>showImg(img.dataset.full));
    document.body.classList.remove('showNav');
  }
  function copyText(t){ navigator.clipboard && navigator.clipboard.writeText(t); }
  function score(s, q){
    const nq=norm(q); if(!nq) return 0;
    const hay=norm(s.search_text); let sc=0;
    if(norm(s.title).includes(nq)) sc+=120;
    if((s.keywords||[]).some(k=>norm(k).includes(nq)||nq.includes(norm(k)))) sc+=80;
    if(hay.includes(nq)) sc+=60;
    const parts=q.toLowerCase().split(/\s+/).filter(Boolean);
    for(const p of parts){ const np=norm(p); if(!np) continue; if(hay.includes(np)) sc+=20; }
    // For CJK short queries, score individual chars lightly
    if(nq.length>=2 && nq.length<=8){ for(const ch of nq){ if(hay.includes(ch)) sc+=1; } }
    return sc;
  }
  function snippet(s,q){
    const text = (s.summary || s.content || '').replace(/\s+/g,' ');
    const nq = q.trim();
    if(!nq) return text.slice(0,180);
    const idx = text.toLowerCase().indexOf(nq.toLowerCase());
    const start = Math.max(0, idx<0 ? 0 : idx-55);
    let sn = (start>0?'…':'') + text.slice(start,start+190) + (start+190<text.length?'…':'');
    return esc(sn).replace(new RegExp(escReg(nq),'gi'), m=>`<mark>${m}</mark>`);
  }
  function doSearch(){
    const q=search.value.trim();
    if(!q){ results.style.display='none'; results.innerHTML=''; openSection((location.hash||'#s001').slice(1)); return; }
    const found = sections.map(s=>({s,score:score(s,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,30);
    results.style.display='block';
    results.innerHTML = `<h2 style="margin-top:0">搜索结果：${esc(q)} <span style="color:var(--muted);font-size:14px">${found.length} 条</span></h2>` + (found.length ? found.map(({s,score})=>`
      <div class="resultItem" data-id="${s.id}"><h3>${esc(s.title)}</h3><p>${snippet(s,q)}</p><div class="resultMeta">${meta(s)} · 匹配度 ${score}</div></div>`).join('') : '<p class="empty">没有找到结果，建议换关键词，例如“黑炭”“发酵货”“宗师披风”。</p>');
    results.querySelectorAll('.resultItem').forEach(el=>el.onclick=()=>openSection(el.dataset.id, q));
    if(found[0]) openSection(found[0].s.id, q);
  }
  function showImg(src){ $('modalImg').src=src; $('modal').style.display='flex'; }
  $('closeModal').onclick=()=>$('modal').style.display='none';
  $('modal').onclick=(e)=>{ if(e.target.id==='modal') $('modal').style.display='none'; };
  search.addEventListener('input', debounce(doSearch, 120));
  function debounce(fn,ms){let t;return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}
  renderToc();
  openSection((location.hash||'#s001').slice(1));
  window.addEventListener('hashchange',()=>openSection((location.hash||'#s001').slice(1)));
})();
</script>
</body>
</html>
